<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 128 128" width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- GNOME-style rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#3584e4" />

  <!-- Subtle inner shadow -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#grad)" />
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.12" />
      <stop offset="1" stop-color="#000" stop-opacity="0.12" />
    </linearGradient>
  </defs>

  <!-- Inner panel area -->
  <rect x="18" y="22" width="92" height="84" rx="6" fill="#fff" fill-opacity="0.15" />

  <!-- Pane divider -->
  <line x1="50" y1="22" x2="50" y2="106" stroke="#fff" stroke-opacity="0.3" stroke-width="1.5" />

  <!-- Sidebar list items -->
  <rect x="26" y="36" width="16" height="3" rx="1.5" fill="#fff" fill-opacity="0.85" />
  <rect x="26" y="48" width="12" height="3" rx="1.5" fill="#fff" fill-opacity="0.55" />
  <rect x="26" y="60" width="18" height="3" rx="1.5" fill="#fff" fill-opacity="0.55" />
  <rect x="26" y="72" width="14" height="3" rx="1.5" fill="#fff" fill-opacity="0.55" />
  <rect x="26" y="84" width="16" height="3" rx="1.5" fill="#fff" fill-opacity="0.55" />

  <!-- Active indicator on first item -->
  <rect x="22" y="33" width="2" height="9" rx="1" fill="#fff" fill-opacity="0.9" />

  <!-- Detail pane: JSON structure -->
  <text x="56" y="44" font-family="monospace" font-weight="bold" font-size="16" fill="#fff" fill-opacity="0.9">{</text>
  <rect x="62" y="52" width="38" height="2.5" rx="1.25" fill="#99c1f1" fill-opacity="0.9" />
  <rect x="62" y="62" width="30" height="2.5" rx="1.25" fill="#fff" fill-opacity="0.6" />
  <rect x="62" y="72" width="34" height="2.5" rx="1.25" fill="#99c1f1" fill-opacity="0.9" />
  <rect x="62" y="82" width="26" height="2.5" rx="1.25" fill="#fff" fill-opacity="0.6" />
  <text x="56" y="100" font-family="monospace" font-weight="bold" font-size="16" fill="#fff" fill-opacity="0.9">}</text>
</svg>
